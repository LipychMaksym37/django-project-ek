<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гітарна Хата</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #f5f5f5;
        }

        header {
            background: #1a1a1a;
            border-bottom: 3px solid #c1121f;
            padding: 20px 50px;
        }

        header h1 {
            margin: 0;
        }

        header h1 a {
            color: #ffcc00;
            text-decoration: none;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            color: #f5f5f5;
            text-decoration: none;
            margin-right: 10px;
            padding: 8px 12px;
            background: #c1121f;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }

        nav a:hover {
            background: #ffcc00;
            color: #111;
        }

        main {
            padding: 30px 50px;
            min-height: 70vh;
        }

        h1, h2, h3 {
            color: #ffcc00;
        }

        a {
            color: #ffcc00;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card, .cart-item, .order-card, .form-card {
            background: #1c1c1c;
            border: 2px solid #c1121f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .product-card {
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: scale(1.03);
            border-color: #ffcc00;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            border: 2px solid #c1121f;
            margin: 10px 0;
        }

        button {
            background: #c1121f;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #ffcc00;
            color: #111;
        }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #c1121f;
            background: #222;
            color: white;
            margin: 5px 0;
        }

        footer {
            background: #1a1a1a;
            border-top: 3px solid #c1121f;
            padding: 20px 50px;
            color: #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1><a href="/">Гітарна Хата</a></h1>

    <nav>
        <a href="/">Головна</a>
        <a href="/cart/">Кошик</a>

        {% if user.is_authenticated %}
            <a href="/profile/">Особистий кабінет</a>
            <a href="/logout/">Вийти</a>
        {% else %}
            <a href="/login/">Увійти</a>
            <a href="/register/">Реєстрація</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    <p>© 2026 Мій маркет</p>
    <p>Контакти: donttobeacunt@gmail.com</p>
</footer>

</body>
</html>
